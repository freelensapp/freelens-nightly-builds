name: Release nightly

on:
  pull_request:
    branches:
      - main
    # Only rebuild on PRs that touch the build recipe itself. Everything the
    # nightly builds comes from the upstream freelensapp/freelens checkout, so a
    # PR that only changes other CI (e.g. the security-scan test workflow) does
    # not need the full build matrix. schedule and workflow_dispatch are
    # unaffected by this filter.
    paths:
      - .github/workflows/release-nightly.yaml
  schedule:
    - cron: 0 2 * * *
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  security-events: write

jobs:
  make-draft-release:
    name: make draft release

    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout freelensapp/freelens
        uses: actions/checkout@v7
        with:
          repository: freelensapp/freelens
          ref: main

      - name: Set current version
        id: version
        run: echo "version=$(yq -pj -oy '.version' freelens/package.json)-nightly-$(date +'%Y-%m-%d')" | tee -a $GITHUB_ENV

      - name: Set release tag
        id: tag
        run: echo "tag=v$version" | tee -a $GITHUB_ENV

      - name: Delete existing nightly build
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        run: |
          gh release delete $tag \
            --yes \
            --cleanup-tag \
            --repo freelensapp/freelens-nightly-builds \
            || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly build draft
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        run: |
          gh release create $tag \
            --draft \
            --title "Nightly build $tag" \
            --repo freelensapp/freelens-nightly-builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      version: ${{ env.version }}
      tag: ${{ env.tag }}

  build-app:
    name: build app

    needs:
      - make-draft-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            os: linux
            arch: x64

          - runs-on: ubuntu-24.04-arm
            os: linux
            arch: arm64

          - runs-on: macos-15
            os: macos
            arch: arm64

          - runs-on: macos-15-intel
            os: macos
            arch: x64

          - runs-on: windows-11-arm
            os: windows
            arch: arm64

          - runs-on: windows-2025
            os: windows
            arch: x64

    runs-on: ${{ matrix.runs-on }}
    environment: ${{ github.ref_name == 'main' && 'test-signing' || null }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}

    env:
      DO_NOT_TRACK: "1"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout freelensapp/freelens
        uses: actions/checkout@v7
        with:
          repository: freelensapp/freelens
          ref: main

      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: tmp/nightly-builds

      - name: Save current revision
        id: current_revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bash coreutils

      - name: Add coreutils to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "/usr/local/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          # Renovate keeps this version up to date via the customManagers hint
          # in .renovaterc.json5 (value must be whitespace-delimited for the
          # regex to capture it, hence the env var rather than a bash
          # assignment).
          YQ_VERSION: v4.53.3 # datasource=github-releases depName=mikefarah/yq
        run: |
          set -eo pipefail
          # winget/choco is not available on every Windows runner image (in
          # particular the windows-11-arm image used for the arm64 build), so
          # download the yq binary directly from the upstream GitHub release.
          # Pick the asset that matches the runner architecture. Expose the
          # install directory to later steps via GITHUB_PATH (Windows form,
          # which Git Bash re-converts to POSIX on startup) and prepend the
          # POSIX form to PATH here so the verification below can find yq.
          case "${{ matrix.arch }}" in
            arm64) yq_arch=arm64 ;;
            *) yq_arch=amd64 ;;
          esac
          yq_version="$YQ_VERSION"
          bin_dir="$HOME/bin"
          mkdir -p "$bin_dir"
          curl -fsSL -o "$bin_dir/yq.exe" \
            "https://github.com/mikefarah/yq/releases/download/${yq_version}/yq_windows_${yq_arch}.exe"
          cygpath --windows "$bin_dir" >> "$GITHUB_PATH"
          PATH="$bin_dir:$PATH"
          yq --version

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-node-

      - name: Disable pre post scripts for pnpm
        shell: bash
        run: pnpm config set enablePrePostScripts false --location project

      - name: Get Electron version
        shell: bash
        run: echo "electron_version=$(yq -py -oy .importers.freelens.devDependencies.electron.version pnpm-lock.yaml | sed
          's/(.*)//')" | tee -a $GITHUB_ENV

      - name: Get Electron Builder version
        shell: bash
        run: echo "electron_builder_version=$(yq -py -oy .importers.freelens.devDependencies.electron-builder.version pnpm-lock.yaml
          | sed 's/(.*)//')" | tee -a $GITHUB_ENV

      # electron-builder's Electron zip downloader doesn't accept a cache
      # directory override and always writes into the OS-default Electron cache
      # dir (see freelensapp/freelens#2305). Point both the "Install Electron
      # binary" step and this cache at that real directory so the two share one
      # @electron/get cache and electron-builder reuses the pre-downloaded
      # binary instead of fetching it again.
      - name: Get Electron cache directory
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            linux) dir="$HOME/.cache/electron" ;;
            macos) dir="$HOME/Library/Caches/electron" ;;
            windows) dir="$LOCALAPPDATA/electron/Cache" ;;
          esac
          echo "electron_cache_dir=$dir" | tee -a $GITHUB_ENV

      # Split restore/save (save runs under if: always() after the build steps
      # below) so a packaging failure that happens after the binaries finish
      # downloading still saves the cache. The combined actions/cache action
      # only saves in a post-job step that a failed job skips
      # (freelensapp/freelens#2303).
      - name: Restore Electron cache
        id: electron-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.electron_cache_dir }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-${{ env.electron_version }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-

      - name: Restore Electron Builder cache
        id: electron-builder-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-builder-${{ env.electron_builder_version }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-builder-

      - name: Tweak package for nightly build
        shell: bash
        run: |
          yq -pj -oj -i ".version = \"$version\"" freelens/package.json
          cp -f tmp/nightly-builds/apt/* freelens/build/apt
          yq -py -oy -i '.deb.fpm += ["./build/apt/freelens-nightly-builds.asc=/etc/apt/keyrings/freelens-nightly-builds.asc", "./build/apt/freelens-nightly-builds.sources=/etc/apt/sources.list.d/freelens-nightly-builds.sources"]' freelens/electron-builder.yml
        env:
          version: ${{ needs.make-draft-release.outputs.version }}

      - name: Install pnpm dependencies
        id: install-pnpm
        shell: bash
        run: pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        shell: bash
        run: pnpm install --color=always --prefer-offline --frozen-lockfile

      # Electron downloads its runtime binary lazily on the first require(),
      # not during pnpm install (pnpm runs no dependency build scripts by
      # default, and node-pty now ships prebuilds so nothing rebuilds Electron
      # either). Fetch and extract it once here, into the same OS-default
      # @electron/get cache directory electron-builder uses at pack time, so
      # electron-builder reuses it instead of re-downloading it (see
      # freelensapp/freelens#2305). electron/install.js reads its cache dir
      # from electron_config_cache.
      - name: Install Electron binary
        shell: bash
        working-directory: freelens
        env:
          electron_config_cache: ${{ env.electron_cache_dir }}
        run: node "$(node -p "require.resolve('electron/install.js')")"

      - name: Build packages
        if: runner.os != 'Windows'
        run: pnpm --color=always --stream build

      # STATUS_DLL_INIT_FAILED (0xC0000142) intermittently crashes turbo's
      # child build processes on the GitHub-hosted Windows runners when the
      # build fans out across all packages at once (see issue #105). Cap
      # turbo's concurrency on Windows to lower the parallelism and memory
      # pressure that trigger the crash; other platforms keep turbo's default.
      - name: Build packages (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm --color=always --stream build
        env:
          TURBO_CONCURRENCY: "2"

      - name: Build extra resources
        id: build-resources
        run: pnpm --color=always build:resources
        continue-on-error: true

      - name: Build extra resources (retry)
        id: build-resources-2
        if: steps.build-resources.outcome == 'failure'
        run: pnpm --color=always build:resources
        continue-on-error: true

      - name: Build extra resources (retry 2)
        if: steps.build-resources-2.outcome == 'failure'
        run: pnpm --color=always build:resources

      - name: Build Electron app (macOS)
        id: build-macos
        if: runner.os == 'macOS'
        run: |
          for var in APPLEID APPLEIDPASS APPLETEAMID CSC_LINK CSC_KEY_PASSWORD CSC_INSTALLER_LINK CSC_INSTALLER_KEY_PASSWORD; do
            test -n "${!var}" || unset $var
          done
          pnpm --color=always build:app \
            dmg pkg \
            --${{ matrix.arch }}
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.CSC_INSTALLER_LINK }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.CSC_INSTALLER_KEY_PASSWORD }}
          DEBUG: electron-builder,electron-builder:*
        continue-on-error: true

      # Retry once to absorb a transient Electron/toolset download failure
      # during packaging (see freelensapp/freelens#2303). Rebuilding and
      # re-signing from scratch is idempotent; notarization happens in the
      # separate steps below.
      - name: Build Electron app (macOS) (retry)
        if: runner.os == 'macOS' && steps.build-macos.outcome == 'failure'
        run: |
          for var in APPLEID APPLEIDPASS APPLETEAMID CSC_LINK CSC_KEY_PASSWORD CSC_INSTALLER_LINK CSC_INSTALLER_KEY_PASSWORD; do
            test -n "${!var}" || unset $var
          done
          pnpm --color=always build:app \
            dmg pkg \
            --${{ matrix.arch }}
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_INSTALLER_LINK: ${{ secrets.CSC_INSTALLER_LINK }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.CSC_INSTALLER_KEY_PASSWORD }}
          DEBUG: electron-builder,electron-builder:*

      - name: Notarize PKG (macOS)
        id: notarize-pkg
        if: runner.os == 'macOS'
        run: |
          if [[ -n $APPLEID && -n $APPLEIDPASS && -n $APPLETEAMID ]]; then
            pkgname=$(ls -1 freelens/dist/Freelens*.pkg | head -n1)
            auth="--apple-id $APPLEID --password $APPLEIDPASS --team-id $APPLETEAMID"
            xcrun notarytool submit $pkgname $auth --wait 2>&1 | tee freelens/dist/notarytool.log
            uuid=$(awk '/id: / { print $2; exit; }' freelens/dist/notarytool.log)
            sleep 60
            if [[ -n $uuid ]]; then
              xcrun notarytool log $uuid $auth
              xcrun stapler staple $pkgname
            fi
          fi
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}
        continue-on-error: true

      - name: Notarize PKG (macOS) (retry)
        id: notarize-pkg-2
        if: runner.os == 'macOS' && steps.notarize-pkg.outcome == 'failure'
        run: |
          if [[ -n $APPLEID && -n $APPLEIDPASS && -n $APPLETEAMID ]]; then
            sleep 600
            pkgname=$(ls -1 freelens/dist/Freelens*.pkg | head -n1)
            auth="--apple-id $APPLEID --password $APPLEIDPASS --team-id $APPLETEAMID"
            xcrun notarytool submit $pkgname $auth --wait 2>&1 | tee freelens/dist/notarytool.log
            uuid=$(awk '/id: / { print $2; exit; }' freelens/dist/notarytool.log)
            sleep 60
            if [[ -n $uuid ]]; then
              xcrun notarytool log $uuid $auth
              xcrun stapler staple $pkgname
            fi
          fi
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}
        continue-on-error: true

      - name: Notarize PKG (macOS) (retry 2)
        if: runner.os == 'macOS' && steps.notarize-pkg-2.outcome == 'failure'
        run: |
          if [[ -n $APPLEID && -n $APPLEIDPASS && -n $APPLETEAMID ]]; then
            sleep 600
            pkgname=$(ls -1 freelens/dist/Freelens*.pkg | head -n1)
            auth="--apple-id $APPLEID --password $APPLEIDPASS --team-id $APPLETEAMID"
            xcrun notarytool submit $pkgname $auth --wait 2>&1 | tee freelens/dist/notarytool.log
            uuid=$(awk '/id: / { print $2; exit; }' freelens/dist/notarytool.log)
            sleep 60
            if [[ -n $uuid ]]; then
              xcrun notarytool log $uuid $auth
              xcrun stapler staple $pkgname
            fi
          fi
        env:
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}

      - name: Build Electron app (Linux)
        id: build-linux
        if: runner.os == 'Linux'
        run: |
          pnpm --color=always build:app \
            AppImage deb rpm \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*
        continue-on-error: true

      # Retry once to absorb a transient Electron/toolset download failure
      # during packaging (see freelensapp/freelens#2303).
      - name: Build Electron app (Linux) (retry)
        if: runner.os == 'Linux' && steps.build-linux.outcome == 'failure'
        run: |
          pnpm --color=always build:app \
            AppImage deb rpm \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*

      # Windows is built in two phases so the native binaries that electron
      # unpacks next to the app (node-pty's pty.node / conpty.node /
      # conpty_console_list.node, conpty.dll and the bundled CLI .exe files)
      # can be code-signed *before* they are packed into the installers.
      # Otherwise those files ship unsigned inside the installer and are
      # quarantined by anti-malware engines such as Trellix (see issue #97).
      #
      # Phase 1: produce the unpacked app directory only (no installers).
      - name: Build Electron app directory (Windows)
        id: build-windows-dir
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pnpm --color=always build:app \
            dir \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*
        continue-on-error: true

      # Retry once to absorb a transient Electron/toolset download failure
      # during packaging (see freelensapp/freelens#2303).
      - name: Build Electron app directory (Windows) (retry)
        if: runner.os == 'Windows' && steps.build-windows-dir.outcome == 'failure'
        shell: bash
        run: |
          pnpm --color=always build:app \
            dir \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*

      - name: Verify app.asar
        shell: bash
        run: |
          set -eo pipefail
          found=0
          while IFS= read -r asar; do
            tmpdir=$(mktemp -d)
            echo "::group::asar extract ${asar}"
            pnpm dlx @electron/asar extract "${asar}" "${tmpdir}"
            echo "::endgroup::"
            rm -rf "${tmpdir}"
            found=$((found + 1))
          done < <(find freelens/dist -type f -name app.asar)
          if [[ "${found}" -eq 0 ]]; then
            echo "No app.asar found under freelens/dist" >&2
            exit 1
          fi

      # Phase 2a: collect the native binaries to sign inside the unpacked app
      # directory (recursing into resources/app.asar.unpacked where the .node
      # modules live). electron-builder names the directory win-unpacked for
      # x64 and win-arm64-unpacked for arm64.
      #
      # Only Windows PE binaries can be code-signed by Azure Trusted Signing.
      # The tree still contains native modules built for other platforms that
      # electron-builder excludes from the package at pack time (node-pty's
      # prebuilds/<os>-<arch>/*.node and pnpm's reflink.<os>-<arch>-*.node).
      # Those are Mach-O/ELF files and make the signer fail (see issue #97), so
      # filter the candidates down to actual PE files using `file` before
      # handing the list to the signing action.
      - name: List unpacked binaries to sign (Windows)
        id: sign-list
        if: runner.os == 'Windows' && github.ref_name == 'main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.arch }}" in
            arm64) unpacked="win-arm64-unpacked" ;;
            *) unpacked="win-unpacked" ;;
          esac
          ws='${{ github.workspace }}'
          dir="freelens/dist/$unpacked"
          list="$RUNNER_TEMP/sign-files.txt"
          : > "$list"
          while IFS= read -r -d '' f; do
            if file -b "$f" | grep -q 'PE32'; then
              # Emit a Windows-style absolute path for the signing action.
              rel="${f#./}"
              printf '%s\\%s\n' "$ws" "${rel//\//\\}" >> "$list"
            fi
          done < <(find "$dir" -type f \( -iname '*.dll' -o -iname '*.exe' -o -iname '*.node' \) -print0)
          if [[ ! -s "$list" ]]; then
            echo "No Windows PE binaries found under ${dir} to sign" >&2
            exit 1
          fi
          echo "Files to sign:"
          cat "$list"
          {
            echo "files<<SIGN_EOF"
            cat "$list"
            echo "SIGN_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Azure Trusted Signing unpacked binaries (Windows)
        if: runner.os == 'Windows' && github.ref_name == 'main' && github.event_name != 'pull_request'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          files: ${{ steps.sign-list.outputs.files }}

      # Phase 2b: pack the already-signed directory into the installers without
      # rebuilding it (--prepackaged), so the signed binaries are preserved.
      # TURBO_FORCE avoids turbo restoring a cached, unsigned dist directory.
      - name: Build Electron app installers (Windows)
        id: build-windows-installers
        if: runner.os == 'Windows'
        shell: bash
        run: |
          case "${{ matrix.arch }}" in
            arm64) unpacked="win-arm64-unpacked" ;;
            *) unpacked="win-unpacked" ;;
          esac
          pnpm --color=always build:app \
            msi nsis portable \
            --prepackaged "$GITHUB_WORKSPACE/freelens/dist/$unpacked" \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*
          TURBO_FORCE: "true"
        continue-on-error: true

      # Retry once to absorb a transient toolset download failure (NSIS,
      # winCodeSign, ...) during installer packaging (see
      # freelensapp/freelens#2303). Runs against the already-signed unpacked
      # dir, so it only re-runs the installer assembly.
      - name: Build Electron app installers (Windows) (retry)
        if: runner.os == 'Windows' && steps.build-windows-installers.outcome == 'failure'
        shell: bash
        run: |
          case "${{ matrix.arch }}" in
            arm64) unpacked="win-arm64-unpacked" ;;
            *) unpacked="win-unpacked" ;;
          esac
          pnpm --color=always build:app \
            msi nsis portable \
            --prepackaged "$GITHUB_WORKSPACE/freelens/dist/$unpacked" \
            --${{ matrix.arch }}
        env:
          DEBUG: electron-builder,electron-builder:*
          TURBO_FORCE: "true"

      # Save the Electron and electron-builder caches unconditionally (the
      # counterpart to the split restore steps above): whatever the build steps
      # downloaded is cached even when a later packaging/signing step fails, so
      # a re-run does not re-download the binaries (freelensapp/freelens#2303).
      # Skip on an exact cache hit (the primary key already exists, so the save
      # would only warn "Unable to reserve cache ...").
      - name: Save Electron cache
        if: always() && steps.electron-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.electron_cache_dir }}
          key: ${{ steps.electron-cache-restore.outputs.cache-primary-key }}

      - name: Save Electron Builder cache
        if: always() && steps.electron-builder-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ steps.electron-builder-cache-restore.outputs.cache-primary-key }}

      - name: Azure Trusted Signing (Windows)
        if: runner.os == 'Windows' && github.ref_name == 'main' && github.event_name != 'pull_request'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\freelens\dist
          files-folder-filter: exe,msi

      - name: Tweak binaries
        shell: bash
        run: |
          find . -name '*pty.node' -print0 | xargs -0 file
          rm -f freelens/dist/*.blockmap

      - name: Normalize filenames before upload
        shell: bash
        run: |
          perl << 'END'
          chdir "freelens/dist" or die $!;
          my %arch = (x64 => "amd64", arm64 => "arm64");
          my $arch = $arch{$ENV{ARCH}};
          while (<Freelens*>) {
            my $src = $_;
            s/[ _]/-/g;
            if (/\.(dmg|exe|msi|pkg)$/ && !/-(amd64|arm64)\./) {
              s/\.(dmg|exe|msi|pkg)$/-$arch.$1/;
            }
            s/[.-](aarch64|arm64)/-arm64/;
            s/[.-](amd64|x86-64)/-amd64/;
            s/-(amd64|arm64).(dmg|pkg)$/-macos-$1.$2/;
            s/-(amd64|arm64).(AppImage|deb|flatpak|rpm|snap)$/-linux-$1.$2/;
            s/-(amd64|arm64)\.msi$/-windows-$1.msi/;
            s/-(amd64|arm64)\.exe$/-windows-portable-$1.exe/ if !/-Setup-/;
            s/-(amd64|arm64)\.exe$/-windows-$1.exe/ if /-Setup-/;
            s/-Setup-/-/;
            my $dst = $_;
            if ($src ne $dst) {
              print "rename $src to $dst\n";
              rename $src, $dst or die $!;
            }
          }
          END
        env:
          ARCH: ${{ matrix.arch }}

      - name: Make checksums for binaries (Linux, Windows)
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          for f in freelens/dist/Freelens*.*; do
            pushd freelens/dist > /dev/null
            sha256sum $(basename $f) | tee $(basename $f).sha256
            popd > /dev/null
          done

      - name: Make checksums for binaries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for f in freelens/dist/Freelens*.*; do
            pushd freelens/dist > /dev/null
            shasum -a 256 $(basename $f) | tee $(basename $f).sha256
            popd > /dev/null
          done

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "freelens/dist/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64'
            || matrix.arch }}-sbom.spdx.json"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch
            }}-sbom.spdx.json"
          upload-release-assets: false

      - name: Create runtime package list
        shell: bash
        run: |
          set -eo pipefail
          # Assemble a production-only dependency tree (no devDependencies) from
          # the already-populated pnpm store, then map each runtime package
          # <name>@<version> to its path in the pnpm store. security-scan uses the
          # keys as the runtime closure (to drop build-time findings) and the
          # paths as the code-scanning location for npm findings (grype otherwise
          # reports them against pnpm-lock.yaml). --legacy is required because the
          # workspace does not set inject-workspace-packages. The lowercase
          # repo-name prefix keeps this file out of the Freelens*.* release-upload
          # glob; it travels to security-scan as a run artifact.
          deploy_dir="$RUNNER_TEMP/freelens-prod"
          rm -rf "$deploy_dir"
          pnpm --filter freelens deploy --prod --legacy --ignore-scripts "$deploy_dir"
          os="${{ matrix.os }}"
          arch="${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}"
          out="freelens/dist/${{ github.event.repository.name }}-${os}-${arch}-prod-packages.json"
          (
            cd "$deploy_dir"
            printf 'key\tvalue\n'
            for d in node_modules/.pnpm/*/; do
              d="${d#node_modules/.pnpm/}"
              d="${d%/}"
              [ "$d" = "node_modules" ] && continue
              # dir name is <name>@<version>[_<peer>]; drop the peer suffix and
              # decode the scoped-package separator (@scope+name -> @scope/name).
              key="${d%%_*}"
              key="${key/+//}"
              printf '%s\t%s\n' "$key" "node_modules/.pnpm/$d/node_modules/${key%@*}"
            done
          ) | yq -pt -oj '.[] as $i ireduce ({}; . * {$i.key: $i.value})' > "$out"
          echo "runtime packages: $(yq -pj -oj 'length' "$out")"

      - name: Upload runtime package list
        uses: actions/upload-artifact@v7
        with:
          name: "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}-prod-packages.json"
          path: "freelens/dist/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' ||
            matrix.arch }}-prod-packages.json"

      - name: Normalize SBOM filename
        shell: bash
        run: |
          version="${{ needs.make-draft-release.outputs.version }}"
          os="${{ matrix.os }}"
          arch="${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}"
          for f in freelens/dist/*-sbom.spdx.json; do
            newname="freelens/dist/Freelens-${version}-${os}-${arch}-sbom.spdx.json"
            mv "$f" "$newname"
            if [ -f "${f}.sha256" ]; then
              mv "${f}.sha256" "${newname}.sha256"
            fi
          done

      - name: Make checksum for SBOM (Linux, Windows)
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          for f in freelens/dist/*-sbom.spdx.json; do
            pushd freelens/dist > /dev/null
            sha256sum $(basename $f) | tee $(basename $f).sha256
            popd > /dev/null
          done

      - name: Make checksum for SBOM (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for f in freelens/dist/*-sbom.spdx.json; do
            pushd freelens/dist > /dev/null
            shasum -a 256 $(basename $f) | tee $(basename $f).sha256
            popd > /dev/null
          done

      - name: List files before upload
        shell: bash
        run: |
          for f in freelens/dist/Freelens*.*; do
            echo "$(ls -l "$f")" "|" "$(file -b "$f")"
          done

      - name: Upload files
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          gh release upload $tag \
            freelens/dist/Freelens*.* \
            --repo freelensapp/freelens-nightly-builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.make-draft-release.outputs.tag }}

    outputs:
      sha: ${{ steps.current_revision.outputs.sha }}

  add-notes-to-release:
    name: add notes to release

    if: github.ref_name == 'main' && github.event_name != 'pull_request'

    needs:
      - make-draft-release
      - build-app

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Add notes to nightly build
        run: |
          gh release edit $tag \
            --notes="Based on https://github.com/freelensapp/freelens/commit/$revision"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.make-draft-release.outputs.tag }}
          revision: ${{ needs.build-app.outputs.sha }}

  security-scan:
    name: security scan

    # Runs only for the real nightly (main, non-PR), after build-app has
    # attached the SBOMs to the still-draft release. publish-release depends on
    # this job, so the scan runs before the release is published (re-running the
    # failed jobs re-scans the same draft). The SBOMs are pulled via the API by
    # release id because `gh release download <tag>` resolves the tag through the
    # published-release endpoint and cannot see a draft.
    if: github.ref_name == 'main' && github.event_name != 'pull_request'

    needs:
      - make-draft-release
      - build-app

    runs-on: ubuntu-24.04-arm

    permissions:
      actions: read
      # write (not read): the GitHub API lists draft releases only to tokens
      # with push access, and the SBOMs live on the still-draft release.
      contents: write
      security-events: write

    env:
      # Renovate keeps this version up to date via the customManagers hint in
      # .renovaterc.json5 (value must be whitespace-delimited for the regex to
      # capture it, hence the env var rather than a bash assignment).
      GRYPE_VERSION: v0.116.0 # datasource=github-releases depName=anchore/grype

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download SBOMs from draft release
        run: |
          set -eo pipefail
          mkdir -p sboms
          # `gh release download` cannot see a draft (it resolves the tag via the
          # published-release endpoint), so find the release by tag_name in the
          # releases list and download its SBOM assets by id.
          release_id=$(gh api --paginate "repos/$repo/releases" \
            --jq ".[] | select(.tag_name == \"$tag\") | .id" | head -n1)
          if [[ -z "$release_id" ]]; then
            echo "Release $tag not found" >&2
            exit 1
          fi
          found=0
          while read -r asset_id asset_name; do
            [[ -n "$asset_id" ]] || continue
            gh api -H "Accept: application/octet-stream" \
              "repos/$repo/releases/assets/$asset_id" > "sboms/$asset_name"
            found=$((found + 1))
          done < <(gh api --paginate "repos/$repo/releases/$release_id/assets" \
            --jq '.[] | select(.name | test("-sbom[.]spdx[.]json$")) | "\(.id) \(.name)"')
          if [[ "$found" -eq 0 ]]; then
            echo "No SBOM assets found on release $tag" >&2
            exit 1
          fi
          ls -l sboms
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          repo: freelensapp/freelens-nightly-builds
          tag: ${{ needs.make-draft-release.outputs.tag }}

      - name: Download runtime package lists
        uses: actions/download-artifact@v8
        with:
          pattern: "*-prod-packages.json"
          path: prod
          merge-multiple: true

      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@v7
        with:
          grype-version: ${{ env.GRYPE_VERSION }}
          cache-db: true

      - name: Scan SBOMs with Grype
        run: |
          set -eo pipefail
          grype="${{ steps.grype.outputs.cmd }}"
          mkdir -p sarifs
          shopt -s nullglob
          # Merge the per-arch runtime package maps (from build-app) into one
          # <name>@<version> -> pnpm-store-path object. Only runtime findings are
          # reported: npm packages in this map, plus non-npm packages (Go modules,
          # native binaries) shipped under freelens/dist or freelens/binaries.
          # This drops build-time dev tools (esbuild, typescript, ...) and the Go
          # binaries bundled with them, which never reach users.
          yq ea -pj -oj '. as $i ireduce ({}; . * $i)' prod/*-prod-packages.json > prod-set.json
          if [[ "$(yq -pj -oj 'length' prod-set.json)" -eq 0 ]]; then
            echo "Runtime package set is empty - refusing to scan (every npm finding would be dropped)" >&2
            exit 1
          fi
          found=0
          for sbom in sboms/*-sbom.spdx.json; do
            name=$(basename "$sbom" .spdx.json)
            # Reduce the SBOM to runtime packages before scanning.
            yq -pj -oj '
              (load("prod-set.json")) as $set |
              .packages |= map(
                ( ((.externalRefs // []) | map(select(.referenceType == "purl")))[0].referenceLocator // "" ) as $purl |
                (.name + "@" + (.versionInfo // "")) as $key |
                ((.sourceInfo // "") | (capture("(?<p>/[^,]*)").p // "")) as $path |
                select(
                  (($purl | test("^pkg:npm/")) and ($set[$key] != null))
                  or
                  (($purl | test("^pkg:npm/") | not) and ($path | test("^/freelens/(dist|binaries)/")))
                )
              )
            ' "$sbom" > "runtime-${name}.spdx.json"
            all=$(yq -pj -oj '.packages | length' "$sbom")
            run=$(yq -pj -oj '.packages | length' "runtime-${name}.spdx.json")
            echo "::group::grype ${sbom} (${all} -> ${run} runtime packages)"
            "$grype" "sbom:runtime-${name}.spdx.json" -o sarif > "sarifs/${name}.sarif"
            echo "::endgroup::"
            found=$((found + 1))
          done
          if [[ "$found" -eq 0 ]]; then
            echo "No SBOM files found to scan under sboms/" >&2
            exit 1
          fi
          # grype leaves the SARIF artifact location empty for SBOM scans, which
          # code scanning rejects with "expected artifact location". For non-npm
          # packages (Go modules, native binaries) the SPDX sourceInfo carries a
          # real path, so build a <name>@<version> -> path map. Build it from the
          # filtered SBOMs so a package present in several binaries (e.g. the Go
          # stdlib in kubectl and in the dev-only tsc binary) maps to a shipped
          # location, not a dropped build-time one.
          yq ea -pj -oj -I0 '[.]' runtime-*.spdx.json |
            yq -pj -oj '
                [ .[].packages[]
                  | select(has("sourceInfo"))
                  | {
                      "key": (.name + "@" + (.versionInfo // "")),
                      "value": ((.sourceInfo | capture("(?<p>/[^,]*)").p) // "" | sub("^/"; ""))
                    }
                  | select(.value != "")
                ] | from_entries
              ' > sbom-paths.json
          # Code scanning accepts only one SARIF run per category, and the
          # per-architecture SBOMs differ (bundled kubectl/helm/proxy CLIs and
          # their Go modules, native npm build variants), so scan them all and
          # merge the runs into one: slurp the SARIFs into an array, union the
          # rules by id and concatenate + de-duplicate the results (grype gives
          # SBOM findings an empty location, so identical cross-arch findings
          # collapse cleanly). Then set each result's artifact location from the
          # finding's <name>@<version>: the pnpm-store path for npm packages, the
          # sourceInfo path for non-npm ones, and a synthetic
          # "sbom/<package>@<version>" as a last resort. Done after the dedup so
          # empty locations collapse first.
          yq ea -pj -oj -I0 '[.]' sarifs/*.sarif |
            yq -pj -oj '
                (load("prod-set.json")) as $prod |
                (load("sbom-paths.json")) as $paths |
                . as $x |
                {
                  "$schema": $x[0]["$schema"],
                  "version": $x[0].version,
                  "runs": [
                    {
                      "tool": {
                        "driver": (
                          $x[0].runs[0].tool.driver |
                          .rules = ([$x[].runs[0].tool.driver.rules[]] | unique_by(.id))
                        )
                      },
                      "results": (
                        [$x[].runs[0].results[]] |
                        unique |
                        map(
                          ((.message.text | capture("package: (?<n>.+?), version (?<v>.*?) was found at:")) // {"n": "unknown", "v": "unknown"}) as $p |
                          ($p.n + "@" + $p.v) as $key |
                          .locations[0].physicalLocation.artifactLocation.uri = ($prod[$key] // $paths[$key] // ("sbom/" + $key))
                        )
                      )
                    }
                  ]
                }
              ' > grype.sarif

      - name: Upload Grype SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype.sarif
          category: grype

  publish-release:
    name: publish release

    if: github.ref_name == 'main' && github.event_name != 'pull_request'

    needs:
      - make-draft-release
      - build-app
      - add-notes-to-release
      - security-scan

    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish nightly build
        run: |
          gh release edit $tag \
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.make-draft-release.outputs.tag }}

      - name: Delete old nightly builds
        run: |
          gh release list --json tagName --jq '.[].tagName' | \
            sort -r -V | \
            sed 1,10d | \
            xargs -IX -rn1 \
            gh release delete X --cleanup-tag --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-apt-repository:
    name: release APT repository

    if: github.ref_name == 'main' && github.event_name != 'pull_request'

    needs:
      - make-draft-release
      - publish-release

    runs-on: ubuntu-24.04-arm
    environment: apt-signing

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: GPG configuration
        run: |
          mkdir -p -m 0700 $HOME/.gnupg
          echo "use-agent" > $HOME/.gnupg/gpg.conf
          echo "pinentry-program $GITHUB_WORKSPACE/.github/scripts/pinentry.sh" > $HOME/.gnupg/gpg-agent.conf
          echo "$GPG_PASSPHRASE" > $HOME/.gnupg/passphrase
          gpgconf --launch gpg-agent
          echo "$GPG_PRIVATE_KEY" | gpg --import
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Release APT repository
        run: |
          set -x
          gh release download $tag -p "*.deb" -D tmp
          pushd tmp
            apt-ftparchive packages . | tee Packages | xz > Packages.xz
            apt-ftparchive release -c ../apt/release.conf . > Release
            gpg --clearsign -o InRelease Release
            gpg --armor --detach-sign --sign -o Release.gpg Release
            gh release upload $tag InRelease Packages Packages.xz Release Release.gpg --clobber
          popd
        env:
          tag: ${{ needs.make-draft-release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
